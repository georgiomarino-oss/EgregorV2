<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Egregor V1 live animated logo">
  <style>
    .spin-slow {
      transform-origin: 512px 512px;
      animation: spin 16s linear infinite;
    }
    .spin-fast {
      transform-origin: 512px 512px;
      animation: spin-r 7s linear infinite;
    }
    .pulse {
      transform-origin: 512px 512px;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    @keyframes spin-r {
      to {
        transform: rotate(-360deg);
      }
    }
    @keyframes pulse {
      0%,
      100% {
        transform: scale(1);
        opacity: 0.84;
      }
      50% {
        transform: scale(1.08);
        opacity: 1;
      }
    }
  </style>
  <defs>
    <radialGradient id="bg-grad" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 512) rotate(90) scale(512)">
      <stop offset="0" stop-color="#17354F"/>
      <stop offset="1" stop-color="#030A13"/>
    </radialGradient>
    <radialGradient id="core-live" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 512) rotate(90) scale(304)">
      <stop offset="0" stop-color="#FFDCA6"/>
      <stop offset="0.42" stop-color="#9DE8FF" stop-opacity="0.74"/>
      <stop offset="1" stop-color="#9DE8FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring-grad" x1="128" y1="128" x2="896" y2="896" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5DE1C2"/>
      <stop offset="0.5" stop-color="#89D8FF"/>
      <stop offset="1" stop-color="#FFDCA6"/>
    </linearGradient>
  </defs>

  <circle cx="512" cy="512" r="500" fill="url(#bg-grad)"/>
  <circle class="pulse" cx="512" cy="512" r="304" fill="url(#core-live)"/>

  <g class="spin-slow">
    <circle cx="512" cy="512" r="382" stroke="url(#ring-grad)" stroke-width="10" stroke-opacity="0.92"/>
    <circle cx="894" cy="512" r="18" fill="#5DE1C2"/>
    <circle cx="512" cy="130" r="17" fill="#89D8FF"/>
    <circle cx="326" cy="840" r="16" fill="#FFBF6B"/>
  </g>

  <g class="spin-fast">
    <ellipse cx="512" cy="512" rx="330" ry="210" stroke="#FFDCA6" stroke-opacity="0.54" stroke-width="6"/>
    <circle cx="770" cy="649" r="15" fill="#89D8FF"/>
    <circle cx="261" cy="390" r="14" fill="#FFBF6B"/>
  </g>

  <circle cx="512" cy="512" r="314" stroke="#A9E8FF" stroke-opacity="0.64" stroke-width="7"/>
  <path d="M130 512H894" stroke="#AEE8FF" stroke-opacity="0.44" stroke-width="6"/>
  <path d="M512 130V894" stroke="#AEE8FF" stroke-opacity="0.34" stroke-width="6"/>
  <circle cx="512" cy="512" r="36" fill="#FFF2DE"/>
  <circle cx="512" cy="512" r="70" stroke="#FFDCA6" stroke-opacity="0.56" stroke-width="4"/>
</svg>
